# Tag-triggered npm release with provenance attestation.
#
# Publishing uses npm Trusted Publishing (GitHub OIDC, no long-lived NPM_TOKEN).
# One-time setup on npmjs.com before the first tag: package settings ->
# Trusted Publishers -> GitHub Actions, repository YonasValentin/claude-kimi-relay,
# workflow release.yml. `--provenance` then attaches a verifiable Sigstore build
# attestation linking the published tarball to this exact commit and run.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # OIDC for npm Trusted Publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      # Trusted Publishing's OIDC token exchange needs npm >= 11.5; an older
      # bundled npm silently publishes unauthenticated (PUT 404).
      - run: npm install -g npm@latest
      - run: npm ci --no-audit --no-fund
      - run: npm run release:check # asserts the tag matches package.json + manifests
      - run: npm run verify
      - name: Publish to npm (skip if this version is already published)
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "claude-kimi-relay@${VERSION}" version >/dev/null 2>&1; then
            echo "claude-kimi-relay@${VERSION} is already on npm; skipping publish."
          else
            npm publish --provenance --access public
          fi
