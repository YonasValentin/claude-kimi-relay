name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci --no-audit --no-fund
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build:all
      - run: npm pack --dry-run
      - run: node scripts/check-plugin-bundle.mjs

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - run: npm ci --no-audit --no-fund
      - run: npm audit --audit-level=moderate

  # Marketplace installs run the committed plugin/dist directly, so a bundle
  # that lags src ships an old runtime (missing, e.g., a security fix) even
  # though CI is green. Rebuild and fail if the committed bundle differs.
  bundle-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - run: npm ci --no-audit --no-fund
      - run: npm run build:all
      - name: Committed plugin/dist must match a fresh build
        run: |
          if [ -n "$(git status --porcelain -- plugin/dist)" ]; then
            echo "::error::plugin/dist is out of sync with src. Run 'npm run build:plugin' and commit the result."
            git status --porcelain -- plugin/dist
            git diff -- plugin/dist
            exit 1
          fi
